[monitor]
; 检查间隔，单位：分钟，必须大于 0
interval_minutes = 60

; 公网 IPv4 查询接口
; 要求接口直接返回纯文本 IPv4，例如：1.2.3.4
ipv4_url = https://api-ipv4.ip.sb/ip

; 公网 IPv6 查询接口
; 要求接口直接返回纯文本 IPv6
ipv6_url = https://api-ipv6.ip.sb/ip

[email]
; 通知邮件收件人
to_addr = receiver@example.com

; 通知邮件发件人
from_addr = sender@example.com

; SMTP 登录账号，通常与发件人邮箱相同
smtp_user = sender@example.com

; SMTP 登录密码或邮箱服务商提供的授权码
smtp_password = your_smtp_password_or_app_code

; SMTP 服务器地址
smtp_host = smtp.example.com

; SMTP 端口
; 常见配置：
; - 465 搭配 use_ssl = true
; - 587 搭配 use_ssl = false
smtp_port = 465

; 是否使用 SMTP SSL
; true  表示使用 SMTP_SSL
; false 表示连接后使用 STARTTLS
use_ssl = true
