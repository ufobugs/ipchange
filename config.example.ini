[monitor]
; 检查间隔，单位：分钟
interval_minutes = 60

; 获取公网 IP 的接口，建议返回纯文本 IP
ip_service_url = https://ifconfig.me/ip

[email]
; 收件人
to_addr = your_to_email@example.com

; 发件人地址
from_addr = your_from_email@example.com

; SMTP 登录账号
smtp_user = your_smtp_user@example.com

; SMTP 登录密码 / 授权码
smtp_password = your_smtp_password_or_app_code

; SMTP 服务器
smtp_host = smtp.example.com

; SMTP 端口
smtp_port = 465

; 是否使用 SSL，常见 465=true，587=false
use_ssl = true
